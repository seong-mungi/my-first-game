# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: time_rewind_scope
    status: active
    api: "Player-only checkpoint model — ECHO state ring buffer (90 frames @ 60fps)"
    not: "Braid model (all dynamic entities) — explicitly rejected for Pillar 2 + solo budget + story integrity"
    adr: docs/architecture/adr-0001-time-rewind-scope.md
    reason: "ECHO-only rewind preserves deterministic enemy patterns (Pillar 2), aligns with REWIND Core personal-device fiction (Story Spine), and fits solo 4-6w Tier 1 budget (Pillar 5)."
    referenced_by:
      - docs/architecture/adr-0001-time-rewind-scope.md
    added: 2026-05-09
    revised: ""

  - purpose: time_rewind_storage
    status: active
    api: "State Snapshot ring buffer — pre-allocated 90 PlayerSnapshot Resources, write-into-place, no per-tick allocation"
    not: "Input Replay (rejected — Godot 4.6 2D physics determinism unguaranteed; Pillar 2 risk). Hybrid (rejected — solo budget waste; 1000-cycle automated test sufficient)."
    adr: docs/architecture/adr-0002-time-rewind-storage-format.md
    reason: "External-dependency-zero data restoration guarantees 100% determinism (Pillar 2 verifiable). 5KB memory budget (0.0003% of 1.5GB ceiling). Save system reuses same Resource serialization. ~90 lines GDScript estimated."
    referenced_by:
      - docs/architecture/adr-0002-time-rewind-storage-format.md
      - docs/architecture/adr-0003-determinism-strategy.md
    added: 2026-05-09
    revised: ""

  - purpose: physics_node_strategy
    status: active
    api: "CharacterBody2D for ECHO + all enemies; Area2D for all projectiles; RigidBody2D cosmetic-only (debris/gibs on layer disjoint from gameplay)"
    not: "RigidBody2D unified (rejected — solver float drift breaks Pillar 2 + ADR-0002 snapshot contract). Mixed Player CharacterBody2D / Enemies+Projectiles RigidBody2D (rejected — Pillar 2 still broken for entities where it matters most)."
    adr: docs/architecture/adr-0003-determinism-strategy.md
    reason: "CharacterBody2D has no solver overriding directly-written transform — restore_from_snapshot() field assignment IS the next-tick state. Area2D has no integrator and never sleeps — projectile motion is fully script-owned. Single paradigm = solo-budget-friendly debug/profile surface. Verified via godot-specialist 2026-05-09."
    referenced_by:
      - docs/architecture/adr-0003-determinism-strategy.md
    added: 2026-05-09
    revised: ""

  - purpose: determinism_clock
    status: active
    api: "Engine.get_physics_frames() — monotonic int incremented each physics step; sole source of game time for AI/timer logic"
    not: "Time.get_ticks_msec() / wall-clock APIs (banned in gameplay-critical paths). Global RNG randi()/randf() (banned — use RandomNumberGenerator with explicit per-encounter seed)."
    adr: docs/architecture/adr-0003-determinism-strategy.md
    reason: "Wall-clock-derived behavior breaks 1000-cycle determinism test by construction. Frame-counter-driven AI is reproducible single-machine. Per-encounter seeded RNG keeps any randomness deterministic across player retries (Pillar 2)."
    referenced_by:
      - docs/architecture/adr-0003-determinism-strategy.md
    added: 2026-05-09
    revised: ""

  - purpose: physics_step_ordering
    status: active
    api: "Node.process_physics_priority ladder — player=0, time-rewind-controller=1, enemies=10, projectiles=20 (lower priority steps first); spawn orchestrators MUST insert children sorted by (spawn_frame, spawn_id)"
    not: "Node.process_priority (only orders _process(), NOT _physics_process — silent determinism break if used here). Implicit scene-tree-order fallback (unstable under runtime add_child/remove_child)."
    adr: docs/architecture/adr-0003-determinism-strategy.md
    reason: "process_physics_priority is the explicit physics-step-ordering knob in 4.6. Without it, sibling order falls back to scene-tree order which is stable only if the tree is never mutated at runtime. Determinism boundary requires explicit ordering for the 1000-cycle test to pass under runtime spawn/despawn (validation criterion #6). TRC=1 ensures snapshot capture reads PlayerMovement after PlayerMovement._physics_process completes (avoids stale-read; design/gdd/time-rewind.md Integration Risk I8)."
    referenced_by:
      - docs/architecture/adr-0003-determinism-strategy.md
      - design/gdd/time-rewind.md  # adds time-rewind-controller=1 slot to the ladder
      - design/gdd/state-machine.md  # explicitly declares SM has NO slot in the ladder (C.3.1) — SM transitions inherit host priority via signal-reactive + tick-driven dispatch (C.3.2)
    added: 2026-05-09
    revised: 2026-05-09

  - purpose: collision_layer_assignment
    status: active
    api: |
      6-bit Area2D collision_layer/mask matrix (Damage GDD C.2):
        bit 1 = echo_hurtbox            (host: ECHO #6)
        bit 2 = echo_projectile_hitbox  (host: Player Shooting #7)
        bit 3 = enemy_hurtbox           (host: Enemy AI #10)
        bit 4 = enemy_projectile_hitbox (host: Enemy AI #10 + Boss Pattern #11)
        bit 5 = hazard_hitbox           (host: Stage #12)
        bit 6 = boss_hurtbox            (host: Boss Pattern #11)
      Mask matrix: ECHO HurtBox(L1) masks {L4,L5}; ECHO Projectile HitBox(L2) masks {L3,L6};
        Enemy HurtBox(L3) masks {L2}; Enemy Projectile HitBox(L4) masks {L1};
        Hazard HitBox(L5) masks {L1}; Boss HurtBox(L6) masks {L2}.
    not: "Ad-hoc per-system layer allocation (would create silent collision graph conflicts). PhysicsServer2D direct queries (gameplay path uses Area2D signals only)."
    adr: design/gdd/damage.md  # GDD-owned (D.1.1 / C.2)
    reason: "Centralizing layer assignment in Damage GDD prevents two systems claiming the same bit and provides single source for self-harm prevention (L2 mask omits L1) + friendly-fire blocking (L4 mask omits L3). All 5 host systems #6/#7/#10/#11/#12 must read this matrix; changes require Damage GDD update + ADR. Bits 7+ reserved for Tier 2 expansion (Pickup #15)."
    referenced_by:
      - design/gdd/damage.md
    added: 2026-05-09
    revised: ""

  - purpose: facing_direction_encoding
    status: active
    api: |
      facing_direction: int (0..7 enum, 8-way rose, CCW from East — verbatim from
      player-movement.md D.4 line 670):
        0 = E   (East)
        1 = NE  (Northeast)
        2 = N   (North)
        3 = NW  (Northwest)
        4 = W   (West)
        5 = SW  (Southwest)
        6 = S   (South)
        7 = SE  (Southeast)
      Internal -1 sentinel ("preserve previous") used only inside PM private helpers
      _encode_facing(v: Vector2i) / _decode_facing(f: int) (D.4 Formula 1) — never
      serialized to PlayerSnapshot. The null-input preservation rule (D.4 Formula 4)
      guarantees facing_direction ∈ {0..7} at every snapshot capture point.
    not: "Vector2 unit (would expand snapshot from 7 fields to 8 + serialization cost). float angle radians (rejected — float comparison fragility breaks animation branch determinism + requires conversion at every read site). enum/StringName (rejected — wider memory than int with no clarity advantage)."
    adr: design/gdd/player-movement.md
    reason: "int 0..7 encodes 8-way aim rose with zero schema growth — PlayerSnapshot stays at 7 fields (ADR-0002 unchanged, Decision B 2026-05-10). Bit-exact comparable across runs (Pillar 2 determinism). Animation lookup is a 1:8 dispatch (Sprite2D flip_h vs 8-anim branch — visual specifics deferred to player-movement.md C.6 + art-director consult, character movement category). _encode_facing/_decode_facing are PM private (D.4 Formula 1) — no external caller decodes the int directly except for animation/sprite branch and forbidden-pattern static analysis."
    referenced_by:
      - design/gdd/player-movement.md  # D.4 single source for encoding
      - docs/architecture/adr-0002-time-rewind-storage-format.md  # 7-field snapshot schema unchanged
    added: 2026-05-10
    revised: ""

  - purpose: pause_handler_autoload
    status: active
    api: "PauseHandler autoload (process_mode = PROCESS_MODE_ALWAYS) using _unhandled_input — single source for `pause` action toggle. Three decision paths: (a) resume — always allowed (no SM veto); (b) initiate — queries SM `can_pause()`, applies pause if true; (c) veto — SM returned false, pause swallowed silently. Calls get_viewport().set_input_as_handled() on **all three paths** (consume-on-decision invariant per AC-IN-20-A)."
    not: "Single SM polling of `pause` action in _physics_process (would deadlock — SM frame counter freezes when get_tree().paused = true; resume becomes impossible). Multiple uncoordinated _input listeners (introduces dispatch ordering ambiguity). Veto-without-consumption (would let event leak to other _unhandled_input listeners as if pause was never pressed; was earlier-draft pattern fixed by B4 reconciliation 2026-05-11)."
    adr: design/gdd/input.md
    reason: "Godot 4.6 canonical pattern for pause-toggle nodes. PROCESS_MODE_ALWAYS keeps the autoload responsive during pause. _unhandled_input (vs _input) lets UI/Menu (#18) consume directional/confirm inputs higher in the dispatch stack without blocking pause. set_input_as_handled() on every decision path (Godot 'consume on decision' pattern) prevents downstream _unhandled_input listeners from reinterpreting an already-resolved pause event. ActiveProfileTracker._input fires *before* _unhandled_input regardless of consumption (E-IN-NEW corrected ordering 2026-05-11) — consumption here doesn't block profile classification. gdscript-specialist Q5 confidence: verified."
    referenced_by:
      - design/gdd/input.md            # C.1.4 single source
      - design/gdd/state-machine.md    # C.2.2 O2 — SM provides can_pause() query interface
    added: 2026-05-11
    revised: "2026-05-11 — B4 reconciliation: documented veto-path consumption explicitly (was implicit in earlier draft, contradicted AC-IN-20-A). Reason added for E-IN-NEW dispatch-order correction (Session 13 review B5)."

  - purpose: active_profile_tracker
    status: active
    api: "ActiveProfileTracker autoload (process_mode = PROCESS_MODE_ALWAYS) using _input — tracks last input source (KB+M vs GAMEPAD) for first-death prompt button-label disambiguation. Two-part API: (A) event-driven source classification updates `_last_input_source: DeviceProfile` + `_last_input_frame: int` on InputEventKey/MouseButton/MouseMotion → KB_M; InputEventJoypadButton → GAMEPAD; InputEventJoypadMotion → GAMEPAD if abs(axis_value) > GAMEPAD_DETECTION_THRESHOLD (0.3). (B) per-query resolution: `active_profile() -> DeviceProfile` returns GAMEPAD if last source was GAMEPAD within HYSTERESIS_FRAMES (180) else KB_M sticky else fallback (GAMEPAD if joypads_connected > 0 else KB_M). `button_label(profile, action_id) -> String` provides device-specific label."
    not: "Native Godot `Input.last_input_source` API (does not exist in Godot 4.6 — must implement). Symmetric KB_M/GAMEPAD hysteresis (rejected — KB_M sticky immediate is intentional: a mouse brush should not flip the gamepad-mode label; KB+M users actively press keys, gamepad users sometimes brush mouse)."
    adr: design/gdd/input.md
    reason: "First-death prompt (C.1.5) requires per-device label string (`[Shift] Rewind` vs `[LT] Rewind`). Without active profile heuristic, the prompt would have to guess or display both — Pillar 4 5분-룰 violation. HYSTERESIS_FRAMES=180 (3초) balances mouse-jitter false-flip prevention vs device-swap responsiveness; OQ-IN-3 pending Tier 1 physical Steam Deck 1세대 verification of GAMEPAD_DETECTION_THRESHOLD=0.3 against RMA stick drift range 0.05–0.18."
    referenced_by:
      - design/gdd/input.md            # D.1 single source + C.1.5
      - design/gdd/state-machine.md    # first_death_in_session signal owner (new — input.md F.3 O-IN-3 obligation)
      - design/gdd/time-rewind.md      # T1 DYING grace window aligns with prompt display duration
    added: 2026-05-11
    revised: ""

  - purpose: scene_manager_group_name
    status: active
    api: '`add_to_group(&"scene_manager")` called as the **first executable statement** of `SceneManager._ready()` (autoload).'
    not: "Direct autoload reference by name (`SceneManager.foo()` lookup) is allowed but discovery for cross-system access uses `get_first_node_in_group(&\"scene_manager\")`."
    adr: design/gdd/scene-manager.md
    reason: "EchoLifecycleSM `_ready()` (state-machine.md C.2.1 line 322) discovers SceneManager via `get_first_node_in_group(&\"scene_manager\")`. Autoloads instantiate before scene tree, so the group registration is guaranteed available before any `_ready()` chain in the loaded scene runs. First-line ordering invariant (Rule 1) ensures the group is populated before any other SM initialization that might block or fail. Pillar 2 결정론 — discovery must never return null mid-`_ready()` chain."
    referenced_by:
      - design/gdd/scene-manager.md        # C.1 Rule 1 (first-line ordering) + G.1 locked constant + AC-H6 (presence grep)
      - design/gdd/state-machine.md        # C.2.1 line 322 (discovery call site)
    added: 2026-05-11
    revised: ""
    notes: "Locked group name (G.1). Modification requires cross-doc batch revision (5+ files: scene-manager.md, state-machine.md, any future system discovering SM via group). Phase 5d batch entry 2026-05-11 — Scene Manager #2 Approved RR7."

  - purpose: checkpoint_anchor_group_name
    status: active
    api: 'Level designers tag respawn anchor nodes with `add_to_group(&"checkpoint_anchor")` in the scene `.tscn`. SceneManager registers `anchors[].global_position` via `get_tree().get_nodes_in_group(&"checkpoint_anchor")` after the scene `_ready()` chain completes (POST-LOAD phase). Last-registered anchor wins on N>1; N=0 triggers `push_error` + fallback to `player.global_position` (E.2; NOT BoundaryState.PANIC).'
    not: "Per-scene hard-coded anchor Vector2 in SceneManager source (level data leak). Multiple anchor groups (e.g., `checkpoint_a` + `checkpoint_b`) — Tier 1 single-anchor-per-scene convention; multi-anchor warning threshold via G.2 `multiple_anchors_warning_n` knob."
    adr: design/gdd/scene-manager.md
    reason: "Single source of respawn position selection — Rule 8 + D.3. Deterministic via Godot scene-tree top-down order (`.tscn` serialization deterministic; no runtime sort). Pillar 1 < 1초 restart + Pillar 2 결정론 jointly require the respawn coordinate be available within K POST-LOAD ticks (D.1 budget) with zero RNG."
    referenced_by:
      - design/gdd/scene-manager.md        # C.1 Rule 8 + D.3 selection rule + G.1 locked constant + AC-H3b / AC-H9 / AC-H10
    added: 2026-05-11
    revised: ""
    notes: "Locked group name (G.1). Tier 2 mid-stage checkpoint pattern may warrant `multiple_anchors_warning_n` knob upgrade (G.4 — threshold raise to 3+ to suppress legitimate multi-anchor warnings). Phase 5d batch entry 2026-05-11 — Scene Manager #2 Approved RR7."

