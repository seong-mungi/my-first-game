# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: direct_player_state_write_during_rewind
    status: active
    description: "External systems must NOT directly write to PlayerMovement.global_position, .velocity, .facing_direction, or animation state during a rewind operation. The single legitimate restoration path is PlayerMovement.restore_from_snapshot(snap: PlayerSnapshot)."
    why: "Direct state writes bypass the snapshot validation pipeline and create silent state-divergence bugs. The Snapshot ring buffer is the source of truth during rewind — multiple writers break determinism (Pillar 2)."
    adr: docs/architecture/adr-0002-time-rewind-storage-format.md
    referenced_by:
      - docs/architecture/adr-0002-time-rewind-storage-format.md
      - docs/architecture/adr-0003-determinism-strategy.md
    added: 2026-05-09

  - pattern: rigidbody2d_for_gameplay_entities
    status: active
    description: "ECHO, all enemies (drone/security bot/STRIDER boss/future archetypes), and all projectiles (player + enemy bullets, grenades, missiles) MUST NOT be RigidBody2D. Required types: ECHO + enemies = CharacterBody2D; projectiles = Area2D. RigidBody2D is permitted ONLY for cosmetic-only debris that (1) is on a collision layer disjoint from all gameplay layers, and (2) is destroyed before it could affect a snapshot capture cycle."
    why: "Godot Physics 2D solver introduces float drift not bit-identical across runs/machines, breaking Pillar 2 (deterministic patterns). Solver-driven motion also violates ADR-0002's snapshot contract: after PhysicsServer2D.body_set_state() the solver may re-settle within the same frame, changing actual restored state from what the snapshot recorded. Bullet trajectory non-determinism (tunneling/bouncing) under RigidBody2D additionally breaks reproducibility."
    adr: docs/architecture/adr-0003-determinism-strategy.md
    referenced_by:
      - docs/architecture/adr-0003-determinism-strategy.md
    added: 2026-05-09

  - pattern: direct_current_state_assignment
    status: active
    description: "External code MUST NOT directly assign StateMachine.current_state = some_state. The single legitimate path to change state is StateMachine.transition_to(new_state, payload, force_re_enter). Direct assignment bypasses exit/enter lifecycle, _is_transitioning lock, state_changed signal emission, and the transition queue (Q_cap)."
    why: "Direct assignment is silently broken — no signal emit means VFX/Audio/debug-overlay observers miss the transition; no exit() call means resource cleanup (timers, animations) leaks; no _is_transitioning lock means re-entrancy guard is bypassed. The bug surfaces only as visual/audio drift, hard to trace. design/gdd/state-machine.md AC-21 enforces this as a negative test (assignment must produce zero state_changed emits, proving the misuse is detectable)."
    adr: design/gdd/state-machine.md
    referenced_by:
      - design/gdd/state-machine.md
    added: 2026-05-09

  - pattern: state_machine_in_autoload
    status: active
    description: "StateMachine instances MUST NOT be Autoload Singletons. They must be child nodes of the host entity (ECHO, enemy, boss). Single-instance Autoload is incompatible with per-entity instantiation and breaks scene-reload lifecycle alignment."
    why: "Autoload persists across scene changes; SM ephemeral state (latch, frame counters, _is_transitioning) becomes stale on scene reload. Furthermore, multi-entity reuse (Tier 1 M1/M2/M3 = ECHO + drone + boss) requires per-host instantiation — Autoload singleton enforcement contradicts the Reuse Across Entities goal (state-machine.md C.4.1)."
    adr: design/gdd/state-machine.md
    referenced_by:
      - design/gdd/state-machine.md
    added: 2026-05-09

  - pattern: cross_entity_sm_transition_call
    status: active
    description: "An entity's StateMachine MUST NOT call StateMachine.transition_to() on another entity's StateMachine. For example, an enemy's SM must NOT directly call ECHO's EchoLifecycleSM.transition_to(DyingState). Cross-entity state changes must be communicated via signals — the signal recipient's own SM decides whether to transition."
    why: "Direct cross-entity calls create strong coupling that breaks 1000-cycle determinism (call timing depends on scene-tree traversal order, which can shift if entity spawn order changes). Signal-mediated communication preserves the connect-order determinism guaranteed by C.3.4 of state-machine.md. Also: cross-entity calls let bugs in one entity's SM corrupt another entity's state — debugging surface explodes."
    adr: design/gdd/state-machine.md
    referenced_by:
      - design/gdd/state-machine.md
    added: 2026-05-09

  - pattern: damage_polls_sm_state
    status: active
    description: "Damage system code MUST NOT read EchoLifecycleSM (or any StateMachine) state. This includes: state_machine.current_state, state_machine.is_rewinding(), state_machine.get_state(), or accessing the SM via NodePath. The i-frame mechanism is unidirectional: SM writes echo_hurtbox.monitoring; Damage observes that area_entered does not fire — no SM-aware code path in Damage."
    why: "Bidirectional Damage↔SM coupling breaks single-source-of-truth (DEC-4). If Damage polls SM state, two outcomes are possible: (1) SM transition not yet complete when Damage reads (race), (2) Damage's i-frame logic diverges from SM's monitoring toggle. Both produce silent invariant violations. AC-21 enforces this as a static-analysis grep ban. Verified by damage.md C.6.1 + D.4.3 single-source contract."
    adr: design/gdd/damage.md
    referenced_by:
      - design/gdd/damage.md
    added: 2026-05-09

  - pattern: delta_accumulator_in_movement
    status: active
    description: "PlayerMovement physics MUST NOT accumulate frame deltas into long-lived state that survives across _physics_process ticks without being reset (e.g., total_dt: float, run_time_elapsed: float, gravity_velocity_acc: float). All movement integration uses per-tick velocity/position math derived from frame-bounded inputs: run accel/decel windowed by input edges (player-movement.md D.1), jump impulse one-shot (D.2), gravity applied per-tick to velocity directly (D.2). Coyote-time and jump-buffer windows count physics frames via Engine.get_physics_frames() with bool active-flag pattern (D.3 — `_jump_buffer_frame: int` + `_jump_buffer_active: bool` pair; `_last_grounded_frame: int` + `_grounded_history_valid: bool` pair; B1 fix 2026-05-11 replaced prior INT_MIN sentinel pattern to eliminate int64 overflow phantom-jump risk), NOT accumulated dt. The only PM long-lived state surviving across ticks is the PlayerSnapshot Resource (9 fields total per Amendment 2 — 7 PM-owned + 1 Weapon-owned `ammo_count` + 1 TRC-internal `captured_at_physics_frame`) + the small set of frame-counter ephemeral int+bool pairs above, not float accumulators."
    why: "Accumulators violate snapshot determinism — PlayerSnapshot only captures explicit fields (9 per Amendment 2; Weapon-side `ammo_count` write authority is Weapon GDD #7 OQ-PM-NEW), so any accumulated float state is invisible to the rewind contract and would silently desync after restore_from_snapshot. Accumulated float state also creates drift across long sessions, breaking 1000-cycle determinism (Pillar 2). Phase 4 unbounded-accumulation bug fix (player-movement.md C.3.1 post-write fix) drove this rule to architecture-registry-level so future PM changes are checked against this stance at authoring time, not discovered at the next cross-GDD review."
    adr: design/gdd/player-movement.md
    referenced_by:
      - design/gdd/player-movement.md
    added: 2026-05-10

  - pattern: gameplay_input_in_callback
    status: active
    description: "Gameplay systems (PM #6, SM #5, TRC #9, Player Shooting #7) MUST NOT poll Input.is_action_*, Input.get_vector, or Input.get_action_strength from _input / _unhandled_input / _unhandled_key_input callbacks. All gameplay input polling occurs in _physics_process Phase 2 only. EXCEPTIONS (Tier 1 — 3 active): (a) UI/Menu system (#18) may use _input for directional/confirm actions; (b) PauseHandler autoload (api_decisions.pause_handler_autoload) uses _unhandled_input for `pause` toggle; (c) ActiveProfileTracker autoload (api_decisions.active_profile_tracker) uses _input for InputEvent source classification (KB+M vs Gamepad) — classification is input-type detection NOT gameplay logic, so falls outside ban scope (input.md C.1.2 Rule 2 explicit exception). Tier 3 CARVE-OUT (B22 fix 2026-05-11 — currently inactive at Tier 1, reserved for #24 Accessibility): AT bridge nodes (Xbox Adaptive Controller / switch access / eye-tracking input injection) are exempt when identified by EITHER (i) class_name with `AssistiveInputBridge` prefix OR (ii) self-declared `@export var _at_bridge_exempt: bool = true` marker. The CI scanner tools/ci/_input_purity.py MUST skip nodes matching either marker. Tier 3 #24 GDD owns scanner implementation + carve-out activation responsibility (input.md F.4.2 row 8)."
    why: "Callback timing is decoupled from physics tick boundaries — same logical input arriving via _input may be processed in different physics frames than the same input polled in _physics_process. Cascade invariant (interfaces.input_polling_contract): all consumers must read the same action state in the same tick. Callbacks break that invariant. Wall-clock-style latency creep + cross-consumer disagreement = Pillar 2 determinism break. Detection: tools/ci/_input_purity.py runs Python multiline regex against PM/SM/TRC/PS source files; awk-range patterns are forbidden (PM B4 trap — collapses on single-line `func _input(e): pass`)."
    adr: design/gdd/input.md
    referenced_by:
      - design/gdd/input.md            # C.1.2 Rule 2 + AC-IN-05
      - design/gdd/player-movement.md  # C.6 row 470 cross-ref
    added: 2026-05-11

  - pattern: wall_clock_in_input_logic
    status: active
    description: "Input system code and input-driven gameplay logic MUST NOT call Time.get_ticks_msec(), Time.get_ticks_usec(), OS.get_ticks_msec(), or use InputEvent.timestamp (wall-clock milliseconds). All frame references and timing windows use Engine.get_physics_frames() (monotonic int) as the single clock source. Applies to: PM (jump_buffer / coyote_frames), SM (rewind_consume window), TRC (snapshot capture), Input (ActiveProfileTracker HYSTERESIS_FRAMES)."
    why: "ADR-0003 api_decisions.determinism_clock locks Engine.get_physics_frames() as the sole game-time source. Wall-clock-derived behavior breaks 1000-cycle determinism by construction (wall-clock drift across runs/machines). InputEvent.timestamp is a wall-clock value emitted by the OS — using it in gameplay logic introduces non-deterministic timing windows. Detection: tools/ci/wall_clock_check.sh grep gate. Banned only in gameplay-critical paths — UI animations / settings menus may use wall-clock for cosmetic timing."
    adr: design/gdd/input.md
    referenced_by:
      - design/gdd/input.md            # D.2 + AC-IN-18
      - docs/architecture/adr-0003-determinism-strategy.md  # determinism_clock single source
    added: 2026-05-11

  - pattern: direct_ammo_count_write_outside_weapon_slot
    status: active
    description: "External systems must NOT directly write to WeaponSlot.ammo_count. The single legitimate restoration path during rewind is WeaponSlot.restore_from_snapshot(snap: PlayerSnapshot), called synchronously by TimeRewindController inside the C.3 Rule 9 atomic sequence (step 2). PlayerMovement.restore_from_snapshot(snap) explicitly IGNORES snap.ammo_count (PM C.1.3 — Weapon owns write authority). Patterns like `_player._weapon_slot.ammo_count = N` from outside src/gameplay/player_shooting/weapon_slot.gd are banned (TRC PlayerSnapshot resource definition file's RHS read is exempt — Tension T3 carve-out)."
    why: "Snapshot field state_ownership ammo_count designates weapon-slot as sole writer (ADR-0002 Amendment 2 Accepted 2026-05-11 via Player Shooting #7). Multiple writers break the Pillar 1 contract (rewind = learning tool, not punishment) — PM C.1.3 layering decision keeps PM ignorant of ammo while WeaponSlot remains single source of truth. Direct writes also bypass D.5 auto-reload invariant and INV-WS-1 single-writer guarantee. Detection: tools/ci/weapon_slot_static_check.sh GREP-PS-1 grep gate (pattern `ammo_count\\s*=` outside src/gameplay/player_shooting/weapon_slot.gd and player_snapshot.gd → 0 matches enforced)."
    adr: docs/architecture/adr-0002-time-rewind-storage-format.md  # Amendment 2 locks Weapon write authority
    referenced_by:
      - design/gdd/player-shooting.md      # C.1 Rule 4 + C.2.2 member declaration + INV-WS-1 + GREP-PS-1 static check
      - design/gdd/player-movement.md      # C.1.3 (PM ignores snap.ammo_count) + DEC-PM-3 v2
      - design/gdd/time-rewind.md          # AC-A1 3-tier ownership (Weapon read at Step (b)) + AC-A4 restore identity
      - docs/architecture/adr-0002-time-rewind-storage-format.md  # Amendment 2 sub-decision OQ-PM-NEW (a) locked
    added: 2026-05-11

  - pattern: deadzone_in_consumer
    status: active
    description: "Consumer gameplay systems (PM #6, SM #5, TRC #9, Player Shooting #7) MUST NOT re-implement deadzone math. Patterns like `if abs(Input.get_joy_axis(...)) > 0.2:` or `if vec.length() > 0.2:` against raw axis values are banned. Single enforcement site: InputMap action deadzone set in project.godot to 0.2 (radial composite, applied automatically by Input.get_vector). Runtime mutation only via SettingsManager.apply_deadzone() in paused tree (Tier 3 accessibility)."
    why: "Per-consumer deadzone re-implementation creates threshold drift: if one consumer sets 0.2 and another 0.25, the cascade invariant breaks. Also bypasses the radial composite semantics — Input.get_vector applies deadzone to magnitude, not per-axis; consumer-side per-axis checks produce different behavior than Input layer. PM B10 BLOCKING surfaced a related problem: `facing_threshold_outside` was set to the same value as `gamepad_deadzone` (both 0.2) creating no-hysteresis facing flicker on Steam Deck stick drift — that PM-specific issue is resolved by PM-side asymmetric thresholds (enter=0.2, exit=0.15), NOT by changing the Input deadzone. Detection: tools/ci/deadzone_consumer_check.sh grep gate."
    adr: design/gdd/input.md
    referenced_by:
      - design/gdd/input.md            # C.1.2 Rule 5 + C.1.3 + AC-IN-08
      - design/gdd/player-movement.md  # E-PM-9 + PM B10 cross-ref
    added: 2026-05-11

