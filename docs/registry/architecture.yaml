# ─── STATE OWNERSHIP ─────────────────────────────────────────────────────────
# Who is the authoritative owner of each piece of shared game state.
# Conflicts: two ADRs claiming to own the same state = data race / authority bug.
#
# Register state when it is READ or WRITTEN by more than one system.
# Internal-only state (never accessed by another system) does not need to be registered.
#
# Required fields: state, owner_system, adr, interface, referenced_by[], added
# interface: how other systems access this state (read-only property, method call,
#   signal, shared resource, etc.) — this is the contract other ADRs depend on.

state_ownership:
  - state: player_rewind_state
    status: active
    owner_system: time-rewind-controller
    adr: docs/architecture/adr-0001-time-rewind-scope.md
    interface: "TimeRewindController.get_remaining_tokens() (read-only int) + signals (rewind_started, rewind_completed, token_consumed, token_replenished)"
    write_access: time-rewind-controller-only
    referenced_by:
      - docs/architecture/adr-0001-time-rewind-scope.md
      - docs/architecture/adr-0002-time-rewind-storage-format.md
    added: 2026-05-09
    revised: ""
    notes: "Ring buffer of last 90 frames of PlayerSnapshot resources. Only ECHO is rewound — enemies/bullets/environment continue normal simulation. See ADR-0001 Decision section. Storage format finalized in ADR-0002 (State Snapshot ring buffer, write-into-place pre-allocated)."

  - state: echo_lifecycle_state
    status: active
    owner_system: echo-lifecycle-sm  # EchoLifecycleSM (StateMachine instance, child of ECHO node)
    adr: design/gdd/state-machine.md  # GDD-owned (no ADR yet — framework-internal decision)
    interface: "EchoLifecycleSM.current_state.name (read-only StringName) + signal state_changed(from, to) + method should_swallow_pause() -> bool"
    write_access: echo-lifecycle-sm-only  # external systems must call transition_to(); direct current_state assignment is forbidden (see forbidden_patterns.direct_current_state_assignment)
    referenced_by:
      - design/gdd/state-machine.md
      - design/gdd/time-rewind.md  # Time Rewind GDD imposes 6 hosting obligations on this SM (C.2.2 of state-machine.md)
    added: 2026-05-09
    revised: ""
    notes: "4 states: ALIVE / DYING / REWINDING / DEAD. Behavior definition is single-sourced in design/gdd/time-rewind.md Section C; state-machine.md hosts only the framework obligations (latch, pause-swallow, signal subscriptions, scene clear). Pause system polls should_swallow_pause(); HUD/VFX/Audio subscribe to state_changed for visual/audio reactions."

  - state: boss_phase_state
    status: active
    owner_system: boss-pattern-system  # per-boss host owns phase_index + phase_hits_remaining
    adr: design/gdd/damage.md  # GDD-owned (boss host follows Damage GDD D.2 transition formula)
    interface: "Boss host members (read-only): phase_index: int, phase_hits_remaining: int, phase_hp_table: Array[int], final_phase_index: int. Mutation only via Damage system's HitBox→HurtBox path triggering D.2.1 transition. Signals: boss_hit_absorbed(boss_id, phase_index, hits_remaining), boss_phase_advanced(boss_id, new_phase), boss_killed(boss_id)."
    write_access: damage-system-mediated  # only Damage system's hurtbox_hit handler decrements; boss host validates table at _ready() (E.11 / AC-15)
    referenced_by:
      - design/gdd/damage.md
    added: 2026-05-09
    revised: ""
    notes: "Discrete phase thresholds (DEC-2). NO HP bar (Anti-Pillar Reveal Through Action). HUD subscribes to boss_phase_advanced only. Multi-hit same-frame transition is single-step bounded (D.2.3 — phase_index += 1 max even if remaining' goes negative). phase_hp_table values are owned per-boss by Boss Pattern GDD #11; Damage GDD owns the format contract (Array[int], length = final_phase_index + 1)."

  - state: player_movement_state
    status: active
    owner_system: player-movement  # PlayerMovement (CharacterBody2D, ECHO root, process_physics_priority=0)
    adr: design/gdd/player-movement.md
    interface: |
      Read (per-tick, 7 fields — PlayerSnapshot capture set; player-movement.md C.1.3):
        PlayerMovement.global_position: Vector2
        PlayerMovement.velocity: Vector2
        PlayerMovement.facing_direction: int           # 0..7 enum (api_decisions.facing_direction_encoding)
        PlayerMovement.current_animation_name: StringName
        PlayerMovement.current_animation_time: float
        PlayerMovement.current_weapon_id: int
        PlayerMovement.is_grounded: bool
      Write: PlayerMovement.restore_from_snapshot(snap: PlayerSnapshot) -> void
        — single legitimate restoration path during rewind (forbidden_patterns.direct_player_state_write_during_rewind enforces this).
    write_access: player-movement-only-or-snapshot-restore  # external systems read-only; only TRC may invoke restore_from_snapshot during a rewind operation
    referenced_by:
      - design/gdd/player-movement.md
      - design/gdd/time-rewind.md      # F.1 #6 — TRC reads 7 fields per tick + invokes restore_from_snapshot
      - design/gdd/state-machine.md    # F.2 row #6 — PlayerMovementSM hosted as sibling of EchoLifecycleSM under PlayerMovement
      - design/gdd/damage.md           # F.1 row #6 — ECHO HurtBox/HitBox/Damage hosted as PlayerMovement children
    added: 2026-05-10
    revised: ""
    notes: "PlayerMovement IS the ECHO root node itself (CharacterBody2D), not a child of an outer ECHO node — see player-movement.md A.Overview Decision A. PlayerMovementSM (extends StateMachine, 6 Tier 1 states: idle/run/jump/fall/aim_lock/dead per DEC-PM-1) is a sibling SM next to EchoLifecycleSM under PlayerMovement (Tier 1 flat composition, NOT parallel ownership — PlayerMovementSM's dead state is reactive to EchoLifecycleSM state_changed via T13). _is_restoring: bool guard (player-movement.md C.4.4 single source) blocks anim method-track callbacks (footstep SFX, dust VFX, bullet spawn) during restore. process_physics_priority=0 (ADR-0003 ladder). 7-field schema is the verbatim interface locked across player-movement.md C.1.3 + time-rewind.md F.1 #6 — any change requires both GDD updates + ADR-0002 Amendment."

  - state: input_actions_catalog
    status: active
    owner_system: input-system
    adr: design/gdd/input.md
    interface: |
      Read (per-tick polling via _physics_process Phase 2 ONLY — never _input/_unhandled_input):
        Input.is_action_pressed(InputActions.X: StringName) -> bool
        Input.is_action_just_pressed(InputActions.X: StringName) -> bool
        Input.is_action_just_released(InputActions.X: StringName) -> bool
        Input.get_vector(InputActions.MOVE_LEFT, MOVE_RIGHT, MOVE_UP, MOVE_DOWN) -> Vector2  # radial composite deadzone 0.2
        Input.get_action_strength(InputActions.X: StringName) -> float
      Write: only via InputMap dynamic mutation in paused tree (SettingsManager.apply_deadzone() / SettingsManager.apply_remap() Tier 3) — Tier 1/2 NO runtime mutation.
      Action catalog (9 fixed): move_left, move_right, move_up, move_down, jump, aim_lock, shoot, rewind_consume, pause.
      Action constants: src/input/input_actions.gd (StringName const class — `InputActions.JUMP = &"jump"` etc).
    write_access: input-system-only-via-settings-manager  # external systems read-only; runtime mutation only via SettingsManager in paused tree (Tier 3)
    referenced_by:
      - design/gdd/input.md
      - design/gdd/player-movement.md      # C.5.1 — PM polls 5 actions in _physics_process Phase 2
      - design/gdd/state-machine.md        # D.2 — SM polls rewind_consume per-tick at AliveState/DyingState physics_update
      - design/gdd/time-rewind.md          # C.3 #1 — TRC verifies SM input state
    added: 2026-05-11
    revised: ""
    notes: "9-action catalog locked Tier 1; Tier 2 zero additions (Difficulty Toggle #20 changes RewindPolicy data only, never InputMap); Tier 3 #23 Input Remapping permits player-bound chord (default mapping table unchanged — 'default_only' interpretation, OQ-15 closure). KB+M defaults: A/D/W/S move, Space jump, F aim_lock (NOT Shift — Shift conflict resolved to rewind_consume), LMB shoot, Shift rewind_consume, Escape pause. Gamepad defaults (Xbox labels; Steam Deck inherits verbatim): Left Stick move, A jump, RB aim_lock, RT shoot, LT(threshold 0.5) rewind_consume, Start pause. PauseHandler autoload (api_decisions.pause_handler_autoload) handles pause toggle via _unhandled_input on PROCESS_MODE_ALWAYS path. ActiveProfileTracker autoload (api_decisions.active_profile_tracker) tracks KB+M/GAMEPAD profile for first-death prompt label (D.1 formula, HYSTERESIS_FRAMES=180)."

  - state: scene_phase
    status: active
    owner_system: scene-manager
    adr: design/gdd/scene-manager.md
    interface: "SceneManager autoload owns 5-phase linear lifecycle (IDLE / PRE_EMIT / SWAPPING / POST_LOAD / READY) + 4-state boundary diagram (BOOT_INTRO / ACTIVE / RESTART_PENDING / CLEAR_PENDING) + PANIC terminal state. External callers use `SceneManager.change_scene_to_packed(packed: PackedScene, intent: TransitionIntent)` single entry point; internal `_trigger_transition()` handles synchronous phase progression (no coroutines — Rule 9 비협상 — preserving < 1.000 s checkpoint restart contract)."
    write_access: scene-manager-only
    referenced_by:
      - design/gdd/scene-manager.md        # C.2.3 enum declarations + C.2.4 ownership boundary
      - design/gdd/state-machine.md        # C.2.2 O6 — EchoLifecycleSM subscribes to scene_will_change emitted in PRE_EMIT phase
      - design/gdd/time-rewind.md          # F.1 row #2 — TRC subscribes to scene_will_change for ring buffer invalidation
      - design/gdd/player-movement.md      # F.4.2 row #2 — PM ephemeral state cleared via EchoLifecycleSM O6 cascade (PM does not directly subscribe — Rule 5)
    added: 2026-05-11
    revised: ""
    notes: "Foundation/Infrastructure state owner. SM is autoload singleton with no `_physics_process` / `_process` override (Rule 2) — phase advancement is signal-reactive, not per-tick polling. Pillar 1 비협상 < 1초 restart and Pillar 4 5분 룰 cold-boot ceiling locked as entities.yaml constants (restart_window_max_frames=60, cold_boot_max_seconds=300). Tier 1 = single stage slice; multi-stage + async load + collage texture memory release deferred to Tier 2 gate (C.1 Rule 3 + Rule 11)."

  - state: ammo_count
    status: active
    owner_system: weapon-slot  # WeaponSlot (Player Shooting #7) — sole writer
    adr: docs/architecture/adr-0002-time-rewind-storage-format.md  # Amendment 2 ratifies Weapon-owned write authority
    interface: "WeaponSlot.ammo_count (read-only int 0..MAGAZINE_SIZE) — read per-tick by TimeRewindController in _capture_to_ring() Step (b); read by HUD #13 for ammo counter UI. Mutated only via _try_fire() decrement + D.5 auto-reload + WeaponSlot.restore_from_snapshot(snap) (called synchronously by TRC inside Rule 9 atomic sequence)."
    write_access: weapon-slot-only-or-snapshot-restore  # external systems read-only; TRC writes only via direct method call (NOT direct property write)
    referenced_by:
      - docs/architecture/adr-0002-time-rewind-storage-format.md   # Amendment 2 — 8th PM-noted field, Weapon-owned write authority
      - design/gdd/player-shooting.md                              # C.2.2 member declaration + C.2.6 TRC orchestration + INV-WS-1 + GREP-PS-1
      - design/gdd/time-rewind.md                                  # AC-A1 3-tier ownership (Weapon read at Step (b)) + C.3 Rule 9 atomic sequence + AC-A4 restore identity
      - design/gdd/player-movement.md                              # DEC-PM-3 v2 (Pillar 1 resolution; PM ignores snap.ammo_count) + F.4.2 row #7 ammo restoration policy close
    added: 2026-05-11
    revised: ""
    notes: "8th PM-noted PlayerSnapshot field (9th Resource field with Amendment 1's captured_at_physics_frame). Single-writer = WeaponSlot (Player Shooting #7) — keeps PM/Weapon layering clean. Restoration mechanism: TRC orchestration (OQ-PM-NEW (a) locked via Player Shooting #7 §C.2.6) — TRC calls _weapon_slot.restore_from_snapshot(snap) inside Rule 9 atomic sequence, NOT signal subscription (path (b) is dead-on-arrival under W2-locked rewind_completed(player, restored_to_frame) signature which doesn't carry snap). Pillar 1 contract: rewind delivers 9-frames-pre-death ammo, not 0-ammo, preventing 'unwinnable rewind' state."

