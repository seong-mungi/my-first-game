# ─── INTERFACE CONTRACTS ──────────────────────────────────────────────────────
# How systems are required to communicate with each other.
# Conflicts: one ADR expects signal, another expects direct call = integration bug.
#
# Register a contract when the communication pattern between two systems is
# explicitly decided in an ADR and other systems must follow the same pattern.
#
# pattern options: signal | direct_call | event_bus | shared_resource | rpc | none

interfaces:
  - contract: rewind_lifecycle
    status: active
    pattern: signal
    producer: time-rewind-controller
    consumers:
      - hud-system          # subscribes to update REWIND token counter UI
      - vfx-system          # subscribes to trigger color-invert + glitch shader
      - audio-system        # subscribes to play rewind SFX cue
      - enemy-ai-base       # subscribes to optionally re-acquire ECHO target
      - boss-pattern-system # subscribes to handle boss-kill token replenish
      - state-machine       # subscribes to drive ALIVE / DYING / REWINDING / DEAD transitions
    adr: docs/architecture/adr-0001-time-rewind-scope.md
    signal_signature: |
      rewind_started(remaining_tokens: int)
      rewind_completed(player: Node2D, restored_to_frame: int)
      rewind_protection_ended(player: Node2D)  # added by design/gdd/time-rewind.md (REWINDING → ALIVE, 30 frames after rewind_started)
      token_consumed(remaining_tokens: int)
      token_replenished(new_total: int)
    referenced_by:
      - docs/architecture/adr-0001-time-rewind-scope.md
      - design/gdd/time-rewind.md  # extends contract with rewind_protection_ended (i-frame end signal)
    added: 2026-05-09
    revised: 2026-05-09

  - contract: state_lifecycle
    status: active
    pattern: signal
    producer: any-state-machine-instance  # every StateMachine node emits this — multiple producers across entities (ECHO, enemies, bosses)
    consumers:
      - vfx-system            # subscribes to trigger DYING pulse, REWINDING glitch shader
      - audio-system          # subscribes to play state-entry SFX cues
      - debug-overlay         # Tier 2 — displays "[ECHO] ALIVE → DYING (frame 12345)"
    adr: design/gdd/state-machine.md  # GDD-owned framework primitive
    signal_signature: |
      state_changed(from_state: StringName, to_state: StringName)
    referenced_by:
      - design/gdd/state-machine.md
    added: 2026-05-09
    revised: ""

  - contract: damage_signals
    status: active
    pattern: signal
    producer: damage-system  # ECHO Damage component + per-host Damage handlers (enemy/boss/hazard)
    consumers:
      - state-machine                # subscribes to player_hit_lethal (DYING transition)
      - time-rewind-controller       # subscribes to lethal_hit_detected (frame N cache) + death_committed (cleanup)
      - hud-system                   # subscribes to boss_phase_advanced (UI notification, NO HP bar)
      - vfx-system                   # subscribes to hurtbox_hit, boss_hit_absorbed, boss_phase_advanced
      - audio-system                 # subscribes to hurtbox_hit, enemy_killed, boss_phase_advanced, death_committed
      - boss-pattern-system          # subscribes to its own boss_phase_advanced (pattern SM re-entry)
      - scene-manager                # subscribes to boss_killed (stage clear trigger)
    adr: design/gdd/damage.md  # GDD-owned (8-signal catalog F.3)
    signal_signature: |
      lethal_hit_detected(cause: StringName)        # ECHO HurtBox area_entered, frame N
      player_hit_lethal(cause: StringName)          # same frame N, SM-targeted
      death_committed(cause: StringName)            # frame N+12, after grace expiry
      hurtbox_hit(cause: StringName)                # per-HurtBox instance signal (any entity)
      enemy_killed(enemy_id: StringName, cause: StringName)
      boss_hit_absorbed(boss_id: StringName, phase_index: int)             # DEC-5 (Round 2): hits_remaining REMOVED for binary contract protection
      boss_pattern_interrupted(boss_id: StringName, prev_phase_index: int) # NEW Round 2: phase advance/kill 직전 emit, Boss Pattern SM cleanup trigger
      boss_phase_advanced(boss_id: StringName, new_phase: int)
      boss_killed(boss_id: StringName)
    invocation_api: |
      Damage.commit_death() -> void                # called by SM DyingState.exit() on grace expiry; idempotent (no-op if _pending_cause empty)
      Damage.cancel_pending_death() -> void        # called by SM RewindingState.enter() on rewind consume; idempotent
      Damage.start_hazard_grace() -> void          # NEW Round 2 (DEC-6): called by SM RewindingState.exit(); 12-frame hazard-only grace
    emit_ordering_contract: |
      # F.4.1 — same-frame emit order (Pillar 2 determinism)
      ECHO hurt path: _pending_cause set → lethal_hit_detected → player_hit_lethal → hurtbox_hit
      Boss hurt path: hurtbox_hit → (boss_hit_absorbed | boss_pattern_interrupted → boss_phase_advanced | boss_pattern_interrupted → boss_killed)
      Multi-enemy same-frame death: enemy_killed emit order = scene-tree-order (ADR-0003 spawn orchestrator)
    referenced_by:
      - design/gdd/damage.md
      - design/gdd/time-rewind.md   # F.1 #8 row consumes lethal_hit_detected + death_committed
      - design/gdd/state-machine.md # F.1 #8 row consumes player_hit_lethal + invokes Damage methods + start_hazard_grace at RewindingState.exit()
    added: 2026-05-09
    revised: 2026-05-09  # Round 2 review: DEC-5 + DEC-6 + boss_pattern_interrupted + start_hazard_grace + emit ordering contract
    notes: "All cause-bearing signals use 1-arg cause: StringName (DEC-1, locked). cause taxonomy single-sourced in damage.md D.3 with hazard_ prefix invariant (DEC-6). 2-stage separation (lethal_hit_detected → grace → death_committed) is owned by Damage but timing controlled by SM DyingState (DEC-4 — Damage does NOT poll SM state). i-frame toggle is HurtBox.monitorable (NOT monitoring) per Godot 4.6 Area2D semantics. Boss phase advance is monotonic +1 (D.2.3 — perfect parry skip explicitly NOT supported, queued ADR boss-phase-advance-monotonicity)."

  - contract: player_movement_snapshot
    status: active
    pattern: shared_resource  # PlayerSnapshot Resource passed via method call (TRC ↔ PlayerMovement)
    producer: time-rewind-controller  # TRC reads PlayerMovement state per tick, writes to ring-buffered PlayerSnapshot Resources, then invokes restore_from_snapshot back into PlayerMovement during rewind
    consumers:
      - player-movement  # invoked back via restore_from_snapshot(snap) during rewind — single legitimate write path
    adr: design/gdd/player-movement.md
    method_signature: |
      PlayerMovement.restore_from_snapshot(snap: PlayerSnapshot) -> void
    snapshot_schema: |
      class_name PlayerSnapshot extends Resource:
        # 7 PM-owned fields (ADR-0002 base):
        global_position: Vector2
        velocity: Vector2
        facing_direction: int              # 0..7 enum (api_decisions.facing_direction_encoding)
        current_animation_name: StringName
        current_animation_time: float
        current_weapon_id: int
        is_grounded: bool
        # 1 Weapon-owned field (ADR-0002 Amendment 2, Proposed 2026-05-11 — DEC-PM-3 v2 / time-rewind.md F6 (b)):
        ammo_count: int                    # 8th PM-noted field — Weapon (#7) single-writer; PM.restore_from_snapshot ignores; Weapon-side restoration mechanism OQ-PM-NEW deferred to Player Shooting #7 GDD authoring
        # 1 TRC-internal field (ADR-0002 Amendment 1, 2026-05-09):
        captured_at_physics_frame: int     # set by TRC at capture; PM does NOT expose
    referenced_by:
      - design/gdd/player-movement.md
      - design/gdd/time-rewind.md
      - docs/architecture/adr-0002-time-rewind-storage-format.md
    added: 2026-05-10
    revised: 2026-05-11  # Amendment 2 Proposed — ammo_count added as 8th PM-noted field
    notes: "9-field Resource total (8 PM-noted + 1 TRC-internal — Amendment 2 Proposed 2026-05-11). Single legitimate write path during rewind for PM 7 fields. restore_from_snapshot must (1) set _is_restoring = true before field assignments, (2) assign 6 numeric/StringName fields (PM-owned only — snap.ammo_count is ignored), (3) AnimationPlayer.play(snap.current_animation_name) + seek(snap.current_animation_time, true) — the second arg true is mandatory in Godot 4.6 (forces immediate evaluation, time-rewind.md I4), (4) clear _is_restoring at end. Anim method-track callbacks (footstep SFX, dust VFX, bullet spawn) MUST short-circuit on _is_restoring (player-movement.md C.4.4) to prevent spurious side effects during restore. AnimationMixer.callback_mode_method MUST be set to ANIMATION_CALLBACK_MODE_METHOD_IMMEDIATE in PlayerMovement._ready() (Godot 4.6 default is DEFERRED — verified 2026-05-11 — under which the guard silently fails because deferred callbacks run after _is_restoring is cleared; see docs/engine-reference/godot/modules/animation.md). forbidden_patterns.direct_player_state_write_during_rewind ban is enforced at PlayerMovement (single enforce site) for the 7 PM-owned fields; ammo_count is separate enforce site at WeaponSlot per Player Shooting #7."

  - contract: input_polling_contract
    status: active
    pattern: direct_call  # Input.is_action_* polled directly from consumers' _physics_process
    producer: input-system  # Godot Input singleton + InputMap
    consumers:
      - player-movement       # C.5.1 — 5 actions: 4 move + jump + aim_lock
      - state-machine         # D.2 — rewind_consume at AliveState/DyingState physics_update
      - time-rewind-controller # process_physics_priority=1 verify-only same-tick poll
      - player-shooting       # provisional — shoot action; detect mode (#7 decision)
      - pause-handler         # _unhandled_input on PROCESS_MODE_ALWAYS autoload — pause action exception
      - menu-pause-ui         # _input callback exception — UI/Menu actions only (NOT gameplay)
    adr: design/gdd/input.md
    polling_contract: |
      Cascade invariant: in a single _physics_process tick, ALL gameplay consumers MUST read the same InputMap action state. This invariant is the foundation of ADR-0003 determinism and SM 16-frame rewind_consume window (state-machine.md D.2).
      Rule 1: Input.is_action_*, Input.get_vector, Input.get_action_strength called ONLY in _physics_process.
      Rule 2: NO gameplay logic in _input / _unhandled_input / _unhandled_key_input. EXCEPTION: UI/Menu (#18) + PauseHandler autoload.
      Rule 3: Phase 2 (input poll) MUTATION-FREE — read only. State transitions and velocity calculations belong to Phase 3+ (player-movement.md C.3 5-phase pattern single source).
      Rule 4: GUT test injection: Input.action_press(InputActions.X) XOR Input.parse_input_event(InputEventAction). NEVER mix in same test fixture (E-IN-16). Helper files: tests/helpers/input_action_press_helper.gd OR tests/helpers/input_event_inject_helper.gd.
      Rule 5: action names use StringName constants from src/input/input_actions.gd (`InputActions.JUMP` NOT `&"jump"` inline).
    referenced_by:
      - design/gdd/input.md
      - design/gdd/player-movement.md
      - design/gdd/state-machine.md
      - design/gdd/time-rewind.md
      - docs/architecture/adr-0003-determinism-strategy.md
    added: 2026-05-11
    revised: ""
    notes: "Foundation/Infrastructure contract — Input doesn't own any gameplay state, but the cascade invariant it provides is load-bearing for every higher invariant (PM jump_buffer / SM rewind window / TRC snapshot capture). Violations are detectable via tools/ci/_input_purity.py (callback purity static check) + tools/ci/input_action_static_check.sh (StringName const usage). Both scripts are AC-IN-04/05 deliverables — meta-runner tools/ci/run_static_checks.sh asserts script existence (PM B2 vaccine)."

