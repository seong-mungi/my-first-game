# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: try_consume_rewind_restore_idx
    status: active
    source: docs/architecture/adr-0002-time-rewind-storage-format.md
    referenced_by:
      - design/gdd/time-rewind.md
      - design/gdd/player-movement.md
      - docs/architecture/adr-0002-time-rewind-storage-format.md
    variables:
      - _lethal_hit_head        # int — cached on player_hit_lethal handler (Amendment 1, 2026-05-09)
      - RESTORE_OFFSET_FRAMES   # 9 (constant)
      - REWIND_WINDOW_FRAMES    # 90 (constant)
    output_range: [0, 89]
    expression: "restore_idx = (_lethal_hit_head - RESTORE_OFFSET_FRAMES + REWIND_WINDOW_FRAMES) % REWIND_WINDOW_FRAMES"
    notes: "Amendment 1 (2026-05-09) replaces live `_write_head` with cached `_lethal_hit_head` to prevent silent post-death restoration when DYING grace +k frames advance write head past lethal hit. Boot-time assert: RESTORE_OFFSET_FRAMES < REWIND_WINDOW_FRAMES (Round 1 정정 — guard against negative mod)."
    added: 2026-05-11
    revised: ""

  - name: jump_height_invariant
    status: active
    source: design/gdd/player-movement.md
    referenced_by:
      - design/gdd/player-movement.md
    variables:
      - jump_velocity_initial   # 480 px/s (Tier 1 default)
      - gravity_rising          # 800 px/s² (Tier 1 default)
    output_range: [144, 144]    # locked invariant — fixed peak height
    expression: "jump_height_max_px = (jump_velocity_initial^2) / (2 * gravity_rising)"
    notes: "Locked invariant — 480² / (2×800) = 144 px exactly. Tuning either knob MUST preserve 144 px peak (Tier 1 height target). Tier 1 lock (Decision A 2026-05-10) chose g_up = 800 to preserve 144 px target after concept revision."
    added: 2026-05-11
    revised: ""

  - name: run_accel_step_size
    status: active
    source: design/gdd/player-movement.md
    referenced_by:
      - design/gdd/player-movement.md
    variables:
      - run_top_speed           # 200 px/s (Tier 1)
      - run_accel_frames        # 6 frames (Tier 1)
      - run_decel_frames        # 8 frames (Tier 1)
      - air_control_coefficient # 0.65 (Tier 1)
    output_range: [0.0, 50.0]   # px/s/frame — practical range under Tier 1 ranges
    expression: |
      step_size_ground_accel = run_top_speed / run_accel_frames    # accel toward non-zero target
      step_size_ground_decel = run_top_speed / run_decel_frames    # decel to 0 or sign reversal pass-through
      step_size_air          = (active_step_ground) * air_control_coefficient
      velocity.x = move_toward(velocity.x, target_vx, active_step)
    notes: "Frame-count based — NOT delta-accumulator. `move_toward()` caps velocity.x ∈ [-run_top_speed, +run_top_speed] always, preventing unbounded accumulation Phase 4 bug. Tier 1 ground accel = 200/6 ≈ 33.3 px/s/frame; air accel = 33.3 × 0.65 ≈ 21.7 px/s/frame."
    added: 2026-05-11
    revised: ""

